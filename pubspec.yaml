name: verto_admin
description: "Admin panel for Verto translation platform"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase for authentication and backend
  supabase_flutter: ^2.8.0
  
  # State management
  provider: ^6.1.0
  
  # Routing
  go_router: ^14.0.0
  
  # Typography
  google_fonts: ^6.2.0
  
  # Charts
  fl_chart: ^0.66.2
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Utils
  intl: ^0.19.0
  
  # Local storage for Remember Me
  shared_preferences: ^2.2.0
  
  # Form validation
  email_validator: ^3.0.0
  flutter_map_cancellable_tile_provider: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
